name: conformance

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  fixtures:
    name: Tier-1 fixtures (${{ matrix.os }}, node${{ matrix.node }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: ["18", "20", "22"]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out matrix256-js
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: matrix256-js

      - name: Check out matrix256 spec repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: shitwolfymakes/matrix256
          path: matrix256

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node }}

      - name: Run synthetic fixture suite
        working-directory: matrix256-js
        run: node tests/generate_fixtures.js
